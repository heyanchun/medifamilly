name: medifamily
description: 亲声药铃 - 帮助子女远程管理长辈吃药计划

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 网络请求
  dio: ^5.4.3
  retrofit: ^4.1.0

  # 本地存储
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # 路由
  go_router: ^13.2.0

  # 音频录制
  record: ^5.1.2
  audioplayers: ^6.0.0
  path_provider: ^2.1.2

  # UI 组件
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.0  # 屏幕适配
  lottie: ^3.1.0               # 动画
  cached_network_image: ^3.3.1

  # 工具
  intl: ^0.19.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
